<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Clock</title>

<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

/* ===== BODY ===== */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* ===== CLOCK CARD ===== */
.clock-container{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px 50px;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);
}

/* ===== DATE ROW ===== */
.child1{
  font-size:14px;
  letter-spacing:2px;
  color:#94a3b8;
  margin-bottom:18px;
}

.child1 span{
  margin:0 4px;
}

/* ===== TIME DISPLAY ===== */
.child2{
  font-size:64px;
  font-weight:700;
  letter-spacing:4px;
  color:#e2e8f0;
  text-shadow:
    0 0 10px rgba(59,130,246,0.6),
    0 0 30px rgba(59,130,246,0.4);
}

/* ===== COLON BLINK EFFECT ===== */
.child2 span:nth-child(2),
.child2 span:nth-child(4){
  animation: blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0.2;}
}

/* ===== RESPONSIVE ===== */
@media (max-width:480px){
  .child2{
    font-size:42px;
  }
  .clock-container{
    padding:30px 25px;
  }
}
</style>
</head>

<body>

<div class="clock-container">

  <div class="child1">
    <span>DATE:</span>
    <span id="date"></span>
    <span>DAY:</span>
    <span id="day"></span>
    <span>YEAR:</span>
    <span id="year"></span>
  </div>

  <div class="child2">
    <span id="hours"></span>
    <span>:</span>
    <span id="minutes"></span>
    <span>:</span>
    <span id="seconds"></span>
  </div>

</div>

<script>
  function date() {
    let date = new Date()
    let monthsnames = ["jan","feb","mar","april","may","june","july","aug","sep","oct","nov","dec"]
    let monthnum = date.getMonth()
    let fullmonth = monthsnames[monthnum]
    let datenum = date.getDate()
   let dateplace = document.getElementById("date")
   dateplace.innerText = datenum+fullmonth
}
date()
function day() {
    let date = new Date()
    let daynum = date.getDay()
    let dayname = ["SUN","MON","TUE","WED","THUR","FRI","SAT"]
    let completeday = dayname[daynum]
    let dayplace = document.getElementById("day")
    dayplace.innerText = completeday
}
day()
function year() {
    let date = new Date()
    let year = date.getFullYear()
    let yearplace = document.getElementById("year")
    yearplace.innerText = year
}
year()
function hours() {
    let date = new Date()
    let hoursnum = date.getHours()
    let hoursplace = document.getElementById("hours")
   if(hoursnum >= 1 && hoursnum <= 11){
      hoursnum = hoursnum+"am"
   }
   else if(hoursnum == 0) {
    hoursnum = 12+"am"
   } 
   else if(hoursnum == 12) {
    hoursnum = 12+"pm"
   }
   else {
    hoursnum = hoursnum-12+"pm"
   }
  hoursplace.innerText = hoursnum
}
hours()
setInterval(hours,1000)
function minutes(){
    let date = new Date()
    let minutesnum = date.getMinutes()
    let minutesplace = document.getElementById("minutes")
    if(minutesnum < 10) {
        minutesplace.innerText = "0"+minutesnum
    }
    else {
        minutesplace.innerText = minutesnum
    }
}
minutes()
setInterval(minutes,1000)
function seconds() {
    let date = new Date()
    let secondsnum = date.getSeconds()
    let secondsplace = document.getElementById("seconds")
    if(secondsnum < 10){
          secondsplace.innerText ="0"+secondsnum
    }
    else {
        secondsplace.innerText = secondsnum
    }
}
seconds()
setInterval(seconds,1000)
</script>
</body>
</html>
