<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylish Time Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #0f172a, #020617),
        linear-gradient(135deg, #020617, #020617);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(99,102,241,.15), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(34,211,238,.12), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(99,102,241,.12), transparent 40%);
      z-index: -1;
    }

    .child2 {
      margin-top: 60px;
    }

    .time-heading {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #6366f1, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(99,102,241,0.4);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    .parent {
      margin-top: 160px;
    }

    .child1 {
      width: 360px;
      padding: 28px 24px;
      background: linear-gradient(135deg, rgba(99,102,241,.25), rgba(34,211,238,.25));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.15);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #e5e7eb;
      box-shadow:
        0 25px 60px rgba(0,0,0,.6),
        inset 0 0 0 rgba(255,255,255,.2);
      position: relative;
      overflow: hidden;
      transition: transform .35s ease, box-shadow .35s ease;
    }

    .child1::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.25), transparent);
      transform: rotate(25deg);
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(200%) rotate(25deg); }
    }

    .child1:hover {
      transform: translateY(-10px) scale(1.04);
      box-shadow:
        0 35px 80px rgba(99,102,241,.6),
        0 0 40px rgba(34,211,238,.4);
    }

    @media (max-width: 500px) {
      .child1 {
        width: 90%;
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="child2">
    <h1 class="time-heading">🕒 Current Time</h1>
  </div>

  <div class="parent">
    <div class="child1" id="child1">Hello World</div>
  </div>

  <script>
    var date = new Date()
    var check = date.getHours()
    var min = date.getMinutes()
    var day = date.getDay()
    var days = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"]

    day = days[day]
    var child1 = document.getElementById("child1");

    if(check <= 11 && check >= 1) {
        child1.innerText = (check+'am '+"min:"+min+ " day:"+day)
    } else if(check == 0) {
        child1.innerText = (12+"am "+"min:"+min+ " day:"+day)
    } else if(check == 12) {
        child1.innerText = (12+"pm "+"min:"+min+ " day:"+day)
    } else {
       check = check-12
        child1.innerText = (check+"pm " + "min:" + min+ " day:"+day)
    }
  </script>

</body>
</html>
