<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List With Firebase</title>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
    }

    nav {
      width: 100%;
      padding: 30px;
      text-align: center;
      font-size: 55px;
      font-weight: bold;
      letter-spacing: 2px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #main {
      width: 90%;
      max-width: 650px;
      margin-top: 50px;
      padding: 35px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }

    #child1 {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    #todoinp {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 16px;
      background-color: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.3s;
    }

    #todoinp::placeholder {
      color: #cbd5e1;
    }

    #todoinp:focus {
      border: 1px solid #38bdf8;
      box-shadow: 0 0 12px #38bdf8;
    }

    #addbtn,
    #updatebtn {
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    #addbtn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    #addbtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(34,197,94,0.4);
    }

    #updatebtn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      display: none;
    }

    #updatebtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(59,130,246,0.4);
    }

    #child2 {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .box {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-size: 18px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .delbtns,
    .editbtns,
    .donebtn,
    .notdonebtn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }

    .delbtns {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .delbtns:hover {
      box-shadow: 0 4px 12px rgba(239,68,68,0.4);
      transform: scale(1.05);
    }

    .editbtns {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    .editbtns:hover {
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
      transform: scale(1.05);
    }

    .donebtn {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .donebtn:hover {
      box-shadow: 0 4px 12px rgba(34,197,94,0.4);
      transform: scale(1.05);
    }

    .notdonebtn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .notdonebtn:hover {
      box-shadow: 0 4px 12px rgba(245,158,11,0.4);
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      nav {
        font-size: 35px;
      }

      #main {
        width: 95%;
        padding: 20px;
      }

      #child1 {
        flex-direction: column;
      }

      #addbtn,
      #updatebtn {
        width: 100%;
      }

      .box {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <nav>Todo List</nav>

  <div id="main">

    <div id="child1" class="childs">
      <input type="text" id="todoinp" placeholder="Enter your todo..." />
      <button id="addbtn">Add</button>
      <button id="updatebtn">Update</button>
    </div>

    <div id="child2" class="childs"></div>

  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
